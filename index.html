<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Arraial Connect</title>

  <link rel="stylesheet" href="style.css">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >
</head>

<body>

  <section class="home">

    <div class="overlay"></div>

    <!-- MENU -->

    <div class="menu">
      <i class="fa-solid fa-bars"></i>
    </div>

    <!-- BANDEIRAS -->

    <div class="flags">
      🔥🌽🪗🎉
    </div>

    <!-- LOGO -->

    <div class="logo">


      <h1>
        Nosso <br>
        Arraial
      </h1>

    </div>

    <!-- LOGIN -->

    <div class="login-form">
      <input id="email" type="email" placeholder="E-mail" />
      <input id="password" type="password" placeholder="Senha" />
    </div>

    <!-- BOTÕES -->

    <div class="buttons">

      <button id="loginButton" class="login">
        Entrar
      </button>

      <button id="googleButton" class="google" type="button">
        Entrar com Google
      </button>

    </div>

  </section>

  <script>
    const loginButton = document.getElementById('loginButton');
    const googleButton = document.getElementById('googleButton');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    loginButton.addEventListener('click', () => {
      if (emailInput.value.trim() === '' || passwordInput.value.trim() === '') {
        alert('Por favor, preencha e-mail e senha.');
        return;
      }
      window.location.href = 'festas.html';
    });

    googleButton.addEventListener('click', () => {
      window.location.href = 'festas.html';
    });

    document.querySelectorAll('.category-button').forEach(button => {
      button.addEventListener('click', () => {
        document.querySelectorAll('.category-button').forEach(item => item.classList.remove('active'));
        button.classList.add('active');
      });
    });

    // ===== TEMPERATURA E COR DE FUNDO =====
    function atualizarTemperatura() {
      const apiKey = 'f3c80e91e5ab42979c7134b41ab3a9e7';
      
      // Tenta usar geolocation se disponível
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&lang=pt_br&appid=${apiKey}`;
            
            fetch(url)
              .then(response => response.json())
              .then(dados => {
                const temperatura = Math.round(dados.main.temp);
                const cidade = dados.name;
                aplicarTemperatura(temperatura, cidade);
              })
              .catch(erro => {
                console.error('Erro ao buscar temperatura por geolocalização:', erro);
                buscarTemperaturaDefaultPorCidade();
              });
          },
          (erro) => {
            console.error('Geolocalização não permitida:', erro);
            buscarTemperaturaDefaultPorCidade();
          }
        );
      } else {
        buscarTemperaturaDefaultPorCidade();
      }
    }

    function buscarTemperaturaDefaultPorCidade() {
      const apiKey = 'f3c80e91e5ab42979c7134b41ab3a9e7';
      const url = `https://api.openweathermap.org/data/2.5/weather?q=São Paulo,BR&units=metric&lang=pt_br&appid=${apiKey}`;
      
      fetch(url)
        .then(response => response.json())
        .then(dados => {
          const temperatura = Math.round(dados.main.temp);
          const cidade = dados.name;
          aplicarTemperatura(temperatura, cidade);
        })
        .catch(erro => {
          console.error('Erro ao buscar temperatura padrão:', erro);
          // Usa temperatura aleatória como fallback
          aplicarTemperaturaFallback();
        });
    }

    function aplicarTemperaturaFallback() {
      // Se tudo falhar, usa uma temperatura aleatória para demonstrar
      const temperaturas = [10, 20, 25, 32];
      const temperatura = temperaturas[Math.floor(Math.random() * temperaturas.length)];
      aplicarTemperatura(temperatura, 'Festa Junina');
    }

    function aplicarTemperatura(temperatura, cidade) {
      const homeSection = document.querySelector('.home');
      if (!homeSection) return;

      let classe = '';
      let descricao = '';
      
      if (temperatura < 15) {
        classe = 'temp-frio';
        descricao = '❄️ Frio';
      } else if (temperatura < 22) {
        classe = 'temp-morno';
        descricao = '🌤️ Morno';
      } else if (temperatura < 28) {
        classe = 'temp-quente';
        descricao = '☀️ Quente';
      } else {
        classe = 'temp-muito-quente';
        descricao = '🔥 Muito Quente';
      }
      
      // Remove classes antigas e adiciona a nova
      homeSection.classList.remove('temp-frio', 'temp-morno', 'temp-quente', 'temp-muito-quente');
      homeSection.classList.add(classe);
      
      // Cria ou atualiza indicador no body para garantir que fica visível
      let indicador = document.querySelector('.temperatura-indicator');
      if (!indicador) {
        indicador = document.createElement('div');
        indicador.className = 'temperatura-indicator';
        document.body.appendChild(indicador);
      }
      
      indicador.textContent = `${descricao} - ${temperatura}°C - ${cidade}`;
      console.log(`Temperatura aplicada: ${descricao} (${temperatura}°C) - ${classe}`);
    }

    // Iniciar ao carregar a página
    document.addEventListener('DOMContentLoaded', () => {
      atualizarTemperatura();
      // Atualiza a cada 10 minutos
      setInterval(atualizarTemperatura, 600000);
    });
  </script>
</body>
</html>
