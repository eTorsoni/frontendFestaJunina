<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Arraial Connect</title>

  <link rel="stylesheet" href="style.css">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >
</head>

<body>

  <section class="home">

    <div class="overlay"></div>

    <!-- MENU -->

    <div class="menu">
      <i class="fa-solid fa-bars"></i>
    </div>

    <!-- BANDEIRAS -->

    <div class="flags">
      🔥🌽🪗🎉
    </div>

    <!-- LOGO -->

    <div class="logo">


      <h1>
        Nosso <br>
        Arraial
      </h1>

    </div>

    <!-- LOGIN -->

    <div class="login-form">
      <input id="email" type="email" placeholder="E-mail" />
      <input id="password" type="password" placeholder="Senha" />
    </div>

    <!-- BOTÕES -->

    <div class="buttons">

      <button id="loginButton" class="login">
        Entrar
      </button>

      <button id="googleButton" class="google" type="button">
        Entrar com Google
      </button>

    </div>

  </section>

  <script>
    const loginButton = document.getElementById('loginButton');
    const googleButton = document.getElementById('googleButton');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    loginButton.addEventListener('click', () => {
      if (emailInput.value.trim() === '' || passwordInput.value.trim() === '') {
        alert('Por favor, preencha e-mail e senha.');
        return;
      }
      window.location.href = 'festas.html';
    });

    googleButton.addEventListener('click', () => {
      window.location.href = 'festas.html';
    });

    document.querySelectorAll('.category-button').forEach(button => {
      button.addEventListener('click', () => {
        document.querySelectorAll('.category-button').forEach(item => item.classList.remove('active'));
        button.classList.add('active');
      });
    });
  </script>
</body>
</html>
